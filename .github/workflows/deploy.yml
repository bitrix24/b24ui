name: Deploy to Pages 📰
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest ]
        node: [ 22 ]

    env:
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Raise V8 heap limit: docs prerender (nuxt generate) otherwise hits the
      # default ~4GB cap and OOMs (exit 134). Runner has 16GB RAM available.
      NODE_OPTIONS: --max-old-space-size=8192
      NUXT_PUBLIC_USE_AI: false
      NUXT_PUBLIC_SITE_URL: https://bitrix24.github.io
      NUXT_PUBLIC_BASE_URL: /b24ui
      NUXT_PUBLIC_CANONICAL_URL: https://bitrix24.github.io
      NUXT_PUBLIC_GIT_URL: https://github.com/bitrix24/b24ui

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: pnpm install

      - name: Prepare
        run: pnpm run dev:prepare

      # Build the dev playgrounds here (moved out of ci.yml to keep PR CI fast).
      # They run before the docs generation so a broken playground build fails
      # the deploy and prevents publishing docs from a broken state.
      - name: Build Nuxt playground
        run: pnpm run dev:build

      - name: Build Vue playground
        run: pnpm run dev:vue:build

      - name: Generate Docs
        run: pnpm run docs:full:generate

      - name: Generate Demo
        run: pnpm run demo:generate

      - name: Build Repl
        run: pnpm repl:build

      - name: Prepare SPA fallback
        run: |
          cd playgrounds/repl/dist
          cp index.html 404.html
          touch .nojekyll

      - name: Create combined artifact
        run: |
          mkdir -p combined-artifact
          cp -r docs/.output/public/* combined-artifact/
          mkdir -p combined-artifact/demo
          cp -r playgrounds/demo/dist/* combined-artifact/demo/
          mkdir -p combined-artifact/play
          cp -r playgrounds/repl/dist/* combined-artifact/play/
          cp playgrounds/repl/public/bitrix24-b24ui.css combined-artifact/play/
          cp playgrounds/repl/public/bitrix24-b24ui.js combined-artifact/play/
          cp playgrounds/repl/dist/.nojekyll combined-artifact/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: combined-artifact
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
