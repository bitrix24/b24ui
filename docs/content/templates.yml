    description: "A dashboard template with multi-column layout for building sophisticated app interfaces."
    iconName: TodoIconsChartBig
    framework: vue
    features:
      - title: Charts and date pickers
        iconName: TodoIconsChartBig
      - title: Multi-column layout
        iconName: TodoIconsColumns3
    deploy_links:
