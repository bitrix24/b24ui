        to: https://vercel.com/new/clone?repository-name=dashboard-vue&repository-url=https%3A%2F%2Fgithub.com%2Fbitrix24%2Ftemplates-dashboard-vue&demo-image=https%3A%2F%2Fbitrix24.github.io%2Fb24ui%2Fassets%2Ftemplates%2Fvue%2Fdashboard-dark.png&demo-url=https%3A%2F%2Fbitrix24.github.io%2Ftemplates-dashboard-vue&demo-title=Vue%20Dashboard%20Template&demo-description=A%20dashboard%20template%20with%20multi-column%20layout%20for%20building%20sophisticated%20app%20interfaces.
